server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: smart-lending

bitfinex:
  api-key: ${BITFINEX_API_KEY:}
  api-secret: ${BITFINEX_API_SECRET:}
  sub-api-key: ${SUB_BITFINEX_API_KEY:}
  sub-api-secret: ${SUB_BITFINEX_API_SECRET:}
  rest-base-url: ${BITFINEX_REST_BASE_URL:https://api.bitfinex.com}
  public-base-url: ${BITFINEX_PUBLIC_BASE_URL:https://api-pub.bitfinex.com}
  market-connect-timeout-seconds: ${BITFINEX_MARKET_CONNECT_TIMEOUT_SECONDS:10}
  market-read-timeout-seconds: ${BITFINEX_MARKET_READ_TIMEOUT_SECONDS:30}
  offer-resubmit-delay-millis: ${BITFINEX_OFFER_RESUBMIT_DELAY_MILLIS:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

performance:
  snapshot-enabled: ${PERFORMANCE_SNAPSHOT_ENABLED:true}
  dashboard-enabled: ${PERFORMANCE_DASHBOARD_ENABLED:true}
  storage-path: ${PERFORMANCE_STORAGE_PATH:data/performance}
  snapshot-fixed-delay-millis: ${PERFORMANCE_SNAPSHOT_FIXED_DELAY_MILLIS:600000}

telegram:
  enabled: ${TELEGRAM_ENABLED:true}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}
  poll-fixed-delay-millis: ${TELEGRAM_POLL_FIXED_DELAY_MILLIS:600000}

